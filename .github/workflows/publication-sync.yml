name: Publication Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

jobs:
  sync-publications:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run publication automation
        shell: pwsh
        run: ./scripts/run-publication-automation.ps1

      - name: Commit and push changes
        shell: pwsh
        run: |
          $status = git status --porcelain
          if (-not $status) {
            Write-Host 'No publication changes to commit.'
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync publications from ORCID"
          git push
